# Cloud DB values will come from Render Environment Variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mcqapp}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:197205}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true